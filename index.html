<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>To-Do List App</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar" id="sidebar"></div>
      <div class="todo-app">
        <div class="leveling">
          <span id="level">Level: 1</span>
          <div class="xp-bar">
            <div id="xp-progress"></div>
          </div>
          <span class="xp-text" id="xp">XP: 0/100</span>
        </div>
        <h2>To-Do List <img src="images/ico.png" alt="icon" /></h2>
        <div class="row" id="input-row">
          <input
            maxlength="200"
            type="text"
            id="input-box"
            placeholder="Add your text"
          />
          <select
            id="difficulty-select"
            style="margin-right: 8px"
            class="difficulty-select"
          >
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
          <button onclick="addTask()">Add</button>
        </div>
        <button id="back-to-current" style="display: none; margin-bottom: 16px">
          Back to Current List
        </button>
        <div id="toast" class="toast"></div>
        <ul id="list-container"></ul>
      </div>
    </div>
    <button
      id="clear-storage-btn"
      style="
        position: fixed;
        bottom: 32px;
        right: 32px;
        z-index: 2000;
        padding: 12px 20px;
        border-radius: 8px;
        background: #d32f2f;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      "
    >
      Clear All Data
    </button>

    <script src="script.js"></script>
  </body>
</html>
